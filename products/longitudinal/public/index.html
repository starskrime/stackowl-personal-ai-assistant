<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Longitudinal AI</title>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #18181f;
      --surface2: #22222e;
      --border: #2e2e3e;
      --text: #e8e8f0;
      --muted: #8888a0;
      --accent: #7c6af7;
      --emerged: #4ade80;
      --faded: #f87171;
      --stable: #60a5fa;
      --significant: #f87171;
      --moderate: #fbbf24;
      --minor: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header p { color: var(--muted); font-size: 0.82rem; }
    .toolbar { padding: 14px 28px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input, select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 0.85rem; outline: none; }
    input:focus, select:focus { border-color: var(--accent); }
    button { padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #6a5ae0; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .btn-sm { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); padding: 5px 12px; font-size: 0.8rem; }
    .btn-sm:hover { color: var(--text); }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
    .card-title { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .timeline-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .timeline-row:last-child { border-bottom: none; }
    .window-label { font-size: 0.82rem; color: var(--muted); width: 130px; flex-shrink: 0; padding-top: 2px; }
    .window-bar { flex: 1; }
    .topic-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
    .chip { padding: 2px 7px; border-radius: 12px; font-size: 0.73rem; background: var(--surface2); color: var(--muted); }
    .drift-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .drift-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
    .drift-minor { background: var(--minor); }
    .drift-moderate { background: var(--moderate); }
    .drift-significant { background: var(--significant); }
    .drift-badge { display: inline-flex; align-items: center; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; margin-left: 6px; }
    .badge-significant { background: rgba(248,113,113,0.15); color: var(--significant); }
    .badge-moderate { background: rgba(251,191,36,0.15); color: var(--moderate); }
    .badge-minor { background: rgba(96,165,250,0.15); color: var(--minor); }
    .shift-list { list-style: none; }
    .shift-item { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.83rem; color: var(--muted); line-height: 1.4; }
    .shift-item:last-child { border-bottom: none; }
    .shift-item strong { color: var(--text); }
    .identity-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .identity-label { font-size: 0.75rem; color: var(--muted); width: 45px; }
    .identity-chip { padding: 3px 9px; border-radius: 12px; font-size: 0.75rem; }
    .chip-current { background: rgba(124,106,247,0.18); color: var(--accent); }
    .chip-past { background: rgba(248,113,113,0.12); color: var(--faded); }
    .report-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-top: 20px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .report-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
    .report-body { font-size: 0.88rem; line-height: 1.65; color: var(--text); white-space: pre-wrap; }
    .highlight-list { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .highlight-item { font-size: 0.82rem; color: var(--muted); padding: 3px 0; }
    .highlight-item::before { content: "→ "; color: var(--accent); }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 0.88rem; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <span style="font-size:1.5rem">📈</span>
    <div>
      <h1>Longitudinal AI</h1>
      <p>Track how you think and evolve over time</p>
    </div>
  </header>

  <div class="toolbar">
    <input id="uid" type="text" placeholder="User ID" value="default" style="width:140px" />
    <select id="window-size">
      <option value="week">Weekly</option>
      <option value="month" selected>Monthly</option>
      <option value="quarter">Quarterly</option>
    </select>
    <button class="btn-primary" onclick="loadAll()" id="load-btn">Load</button>
    <button class="btn-sm" onclick="generateReport('mirror')">🪞 Mirror Report</button>
    <button class="btn-sm" onclick="generateReport('digest')">📋 Digest</button>
  </div>

  <div class="container" id="main-container" style="display:none">
    <div>
      <!-- Timeline -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">Timeline</div>
        <div id="timeline-list"><div class="empty">No data</div></div>
      </div>

      <!-- Priority Shifts -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">Priority Shifts</div>
        <ul class="shift-list" id="shifts-list"><li class="shift-item" style="color:var(--muted)">No significant shifts detected</li></ul>
      </div>

      <!-- Report -->
      <div id="report-area"></div>
    </div>

    <div>
      <!-- Stats -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">Overview</div>
        <div class="stat-grid" id="stats-grid"></div>
      </div>

      <!-- Identity -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">Identity</div>
        <div id="identity-section"></div>
      </div>

      <!-- Drift Summary -->
      <div class="card">
        <div class="card-title">Drift Analysis</div>
        <div id="drift-summary" style="font-size:0.85rem;line-height:1.6;color:var(--muted)">—</div>
      </div>
    </div>
  </div>

  <div id="empty-state" style="text-align:center;padding:80px 20px;color:var(--muted)">
    <div style="font-size:3rem;margin-bottom:12px">🌱</div>
    <p>Enter a user ID and click Load to explore your longitudinal data.</p>
  </div>

  <script>
    let currentTimeline = null;
    let currentDrift = null;

    async function loadAll() {
      const uid = document.getElementById('uid').value.trim();
      if (!uid) return;
      const btn = document.getElementById('load-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Loading…';

      try {
        const ws = document.getElementById('window-size').value;
        const [timeline, drift] = await Promise.all([
          fetch(`/timeline/${uid}?window=${ws}`).then(r => r.json()),
          fetch(`/drift/${uid}?window=${ws}`).then(r => r.json()),
        ]);
        currentTimeline = timeline;
        currentDrift = drift;
        renderAll(timeline, drift);
        document.getElementById('main-container').style.display = 'grid';
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('report-area').innerHTML = '';
      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Load';
      }
    }

    function renderAll(timeline, drift) {
      renderStats(timeline, drift);
      renderTimeline(timeline);
      renderIdentity(drift);
      renderShifts(drift);
      document.getElementById('drift-summary').textContent = drift.summary || '—';
    }

    function renderStats(timeline, drift) {
      const g = document.getElementById('stats-grid');
      const driftColor = drift.driftLevel === 'significant' ? 'var(--significant)' : drift.driftLevel === 'moderate' ? 'var(--moderate)' : 'var(--stable)';
      g.innerHTML = `
        <div class="stat-box"><div class="stat-val">${timeline.totalEpisodes}</div><div class="stat-label">Total Interactions</div></div>
        <div class="stat-box"><div class="stat-val">${timeline.windows.length}</div><div class="stat-label">Time Windows</div></div>
        <div class="stat-box"><div class="stat-val" style="color:${driftColor}">${cap(drift.driftLevel)}</div><div class="stat-label">Drift Level</div></div>
        <div class="stat-box"><div class="stat-val">${(drift.overallDrift * 100).toFixed(0)}%</div><div class="stat-label">Overall Change</div></div>
      `;
    }

    function renderTimeline(timeline) {
      const el = document.getElementById('timeline-list');
      if (!timeline.windows || timeline.windows.length === 0) {
        el.innerHTML = '<div class="empty">No timeline data yet</div>';
        return;
      }
      el.innerHTML = [...timeline.windows].reverse().map(point => {
        const driftClass = point.driftFromPrevious > 0.6 ? 'drift-significant' : point.driftFromPrevious > 0.3 ? 'drift-moderate' : 'drift-minor';
        const driftPct = Math.min(100, Math.round(point.driftFromPrevious * 100));
        const chips = point.window.topTopics.slice(0, 5).map(t => `<span class="chip">${esc(t.topic)}</span>`).join('');
        const badge = point.driftFromPrevious > 0.3
          ? `<span class="drift-badge ${point.driftFromPrevious > 0.6 ? 'badge-significant' : 'badge-moderate'}">${driftPct}% drift</span>`
          : '';
        return `<div class="timeline-row">
          <div class="window-label">${esc(point.window.label)}${badge}</div>
          <div class="window-bar">
            <div class="topic-chips">${chips || '<span style="color:var(--muted);font-size:0.75rem">No topics</span>'}</div>
            <div style="font-size:0.73rem;color:var(--muted)">${point.window.episodeCount} interactions</div>
            <div class="drift-bar"><div class="drift-fill ${driftClass}" style="width:${driftPct}%"></div></div>
          </div>
        </div>`;
      }).join('');
    }

    function renderIdentity(drift) {
      const el = document.getElementById('identity-section');
      const curr = drift.currentIdentity || [];
      const past = drift.pastIdentity || [];
      if (curr.length === 0 && past.length === 0) {
        el.innerHTML = '<div style="color:var(--muted);font-size:0.83rem">Not enough data</div>';
        return;
      }
      el.innerHTML = `
        <div class="identity-row"><span class="identity-label" style="color:var(--accent);font-size:0.72rem">NOW</span>${curr.map(t => `<span class="identity-chip chip-current">${esc(t)}</span>`).join('')}</div>
        ${past.length > 0 ? `<div class="identity-row"><span class="identity-label" style="color:var(--faded);font-size:0.72rem">PAST</span>${past.map(t => `<span class="identity-chip chip-past">${esc(t)}</span>`).join('')}</div>` : ''}
      `;
    }

    function renderShifts(drift) {
      const el = document.getElementById('shifts-list');
      const shifts = drift.priorityShifts || [];
      if (shifts.length === 0) {
        el.innerHTML = '<li class="shift-item" style="color:var(--muted)">No significant priority shifts detected</li>';
        return;
      }
      el.innerHTML = shifts.map(s =>
        `<li class="shift-item"><strong>${esc(s.windowLabel)}</strong> — ${esc(s.description)}</li>`
      ).join('');
    }

    async function generateReport(type) {
      const uid = document.getElementById('uid').value.trim();
      if (!uid) return;
      const area = document.getElementById('report-area');
      area.innerHTML = '<div class="report-card"><span class="spinner"></span> Generating report…</div>';
      try {
        const ws = document.getElementById('window-size').value;
        const resp = await fetch(`/report/${uid}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type, windowSize: ws }),
        });
        const report = await resp.json();
        if (report.error) { area.innerHTML = `<div class="report-card" style="color:var(--faded)">${esc(report.error)}</div>`; return; }
        area.innerHTML = `
          <div class="report-card">
            <div class="report-title">${esc(report.title)}</div>
            <div class="report-body">${esc(report.narrative)}</div>
            ${report.highlights && report.highlights.length > 0 ? `
              <div class="highlight-list">
                ${report.highlights.map(h => `<div class="highlight-item">${esc(h)}</div>`).join('')}
              </div>` : ''}
          </div>`;
      } catch (e) {
        area.innerHTML = `<div class="report-card" style="color:var(--faded)">Error: ${esc(e.message)}</div>`;
      }
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function cap(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }
  </script>
</body>
</html>
