name: Auto-merge Dependabot security PRs
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Merge security PRs
        run: echo "Auto-merge requires DEPENDABOT_PAT secret — configure in repo settings"
